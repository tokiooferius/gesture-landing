<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E0E7FF" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Hand (OK gesture - thumb and index pinched) -->
  <g transform="translate(100, 100)">
    <!-- Wrist -->
    <rect x="-15" y="20" width="30" height="35" fill="#F4A76A" rx="8"/>
    
    <!-- Palm -->
    <ellipse cx="0" cy="-5" rx="25" ry="30" fill="#F4A76A"/>
    
    <!-- Thumb (pointing up slightly bent) -->
    <path d="M -22 -8 Q -28 -25 -22 -35" fill="none" stroke="#E89B5E" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-22" cy="-38" r="6" fill="#E89B5E"/>
    
    <!-- Index finger (bent to touch thumb) -->
    <path d="M -12 -35 Q -15 -28 -18 -20" fill="none" stroke="#E89B5E" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-18" cy="-17" r="6" fill="#E89B5E"/>
    
    <!-- Circle showing OK gesture -->
    <circle cx="-18" cy="-25" r="8" fill="none" stroke="#10B981" stroke-width="2" opacity="0.6"/>
    
    <!-- Middle finger (up) -->
    <rect x="-6" y="-45" width="9" height="50" fill="#F4A76A" rx="4.5"/>
    <circle cx="-1.5" cy="-48" r="5.5" fill="#E89B5E"/>
    
    <!-- Ring finger (up) -->
    <rect x="6" y="-40" width="9" height="45" fill="#F4A76A" rx="4.5"/>
    <circle cx="10.5" cy="-43" r="5.5" fill="#E89B5E"/>
    
    <!-- Pinky (up) -->
    <rect x="18" y="-35" width="9" height="40" fill="#F4A76A" rx="4.5"/>
    <circle cx="22.5" cy="-38" r="5.5" fill="#E89B5E"/>
  </g>
</svg>