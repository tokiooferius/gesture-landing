<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E0E7FF" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Hand (Peace V - index and middle fingers up) -->
  <g transform="translate(100, 100)">
    <!-- Wrist -->
    <rect x="-15" y="20" width="30" height="35" fill="#F4A76A" rx="8"/>
    
    <!-- Palm -->
    <ellipse cx="0" cy="-2" rx="23" ry="28" fill="#F4A76A"/>
    
    <!-- Thumb (up slightly) -->
    <path d="M -22 -8 Q -28 -20 -24 -32" fill="none" stroke="#E89B5E" stroke-width="9" stroke-linecap="round"/>
    <circle cx="-24" cy="-34" r="5.5" fill="#E89B5E"/>
    
    <!-- Index finger (V shape - left) -->
    <rect x="-18" y="-48" width="9" height="52" fill="#F4A76A" rx="4.5"/>
    <circle cx="-13.5" cy="-51" r="5.5" fill="#E89B5E"/>
    
    <!-- Middle finger (V shape - right) -->
    <rect x="-2" y="-48" width="9" height="52" fill="#F4A76A" rx="4.5"/>
    <circle cx="2.5" cy="-51" r="5.5" fill="#E89B5E"/>
    
    <!-- V line showing peace -->
    <line x1="-13.5" y1="-46" x2="-10" y2="-8" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
    <line x1="2.5" y1="-46" x2="0" y2="-8" stroke="#10B981" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Ring finger (bent) -->
    <path d="M 12 -35 Q 14 -20 12 -5" fill="none" stroke="#E89B5E" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Pinky (bent) -->
    <path d="M 24 -28 Q 25 -14 23 2" fill="none" stroke="#E89B5E" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>