<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E0E7FF" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Hand (Pointing Index - only index finger up) -->
  <g transform="translate(100, 100)">
    <!-- Wrist -->
    <rect x="-15" y="20" width="30" height="35" fill="#F4A76A" rx="8"/>
    
    <!-- Palm (slightly closed) -->
    <ellipse cx="0" cy="0" rx="22" ry="25" fill="#F4A76A"/>
    
    <!-- Thumb (bent inward) -->
    <path d="M -20 -5 Q -26 -10 -25 0" fill="none" stroke="#E89B5E" stroke-width="9" stroke-linecap="round"/>
    
    <!-- Index finger (pointing up straight) -->
    <rect x="-6" y="-50" width="10" height="55" fill="#F4A76A" rx="5"/>
    <circle cx="-1" cy="-53" r="6" fill="#E89B5E"/>
    <!-- Highlight on finger -->
    <ellipse cx="-3" cy="-30" rx="2.5" ry="8" fill="#fff" opacity="0.3"/>
    
    <!-- Middle finger (bent) -->
    <path d="M 6 -30 Q 8 -15 6 -5" fill="none" stroke="#E89B5E" stroke-width="9" stroke-linecap="round"/>
    
    <!-- Ring finger (bent) -->
    <path d="M 18 -25 Q 20 -12 18 0" fill="none" stroke="#E89B5E" stroke-width="9" stroke-linecap="round"/>
    
    <!-- Pinky (bent) -->
    <path d="M 28 -20 Q 29 -8 27 5" fill="none" stroke="#E89B5E" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>