<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E0E7FF" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Hand (palm open, all fingers up) -->
  <g transform="translate(100, 100)">
    <!-- Wrist -->
    <rect x="-15" y="20" width="30" height="35" fill="#F4A76A" rx="8"/>
    
    <!-- Palm -->
    <ellipse cx="0" cy="-5" rx="25" ry="30" fill="#F4A76A"/>
    
    <!-- Thumb -->
    <ellipse cx="-28" cy="0" rx="10" ry="20" fill="#E89B5E" transform="rotate(-35 -28 0)"/>
    
    <!-- Index finger -->
    <rect x="-18" y="-40" width="9" height="45" fill="#F4A76A" rx="4.5"/>
    <circle cx="-14.5" cy="-43" r="5.5" fill="#E89B5E"/>
    
    <!-- Middle finger -->
    <rect x="-6" y="-45" width="9" height="50" fill="#F4A76A" rx="4.5"/>
    <circle cx="-1.5" cy="-48" r="5.5" fill="#E89B5E"/>
    
    <!-- Ring finger -->
    <rect x="6" y="-40" width="9" height="45" fill="#F4A76A" rx="4.5"/>
    <circle cx="10.5" cy="-43" r="5.5" fill="#E89B5E"/>
    
    <!-- Pinky -->
    <rect x="18" y="-35" width="9" height="40" fill="#F4A76A" rx="4.5"/>
    <circle cx="22.5" cy="-38" r="5.5" fill="#E89B5E"/>
    
    <!-- Nails (optional details) -->
    <ellipse cx="-14.5" cy="-46" rx="3.5" ry="2" fill="#fff" opacity="0.4"/>
    <ellipse cx="-1.5" cy="-51" rx="3.5" ry="2" fill="#fff" opacity="0.4"/>
    <ellipse cx="10.5" cy="-46" rx="3.5" ry="2" fill="#fff" opacity="0.4"/>
    <ellipse cx="22.5" cy="-41" rx="3.5" ry="2" fill="#fff" opacity="0.4"/>
  </g>
</svg>