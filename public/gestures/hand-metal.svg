<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E0E7FF" stroke="#2563EB" stroke-width="2"/>
  
  <!-- Hand (Metal/Spiderman - index and pinky up) -->
  <g transform="translate(100, 100)">
    <!-- Wrist -->
    <rect x="-15" y="20" width="30" height="35" fill="#F4A76A" rx="8"/>
    
    <!-- Palm -->
    <ellipse cx="0" cy="-2" rx="23" ry="28" fill="#F4A76A"/>
    
    <!-- Thumb (up) -->
    <path d="M -22 -8 Q -28 -20 -24 -32" fill="none" stroke="#E89B5E" stroke-width="9" stroke-linecap="round"/>
    <circle cx="-24" cy="-34" r="5.5" fill="#E89B5E"/>
    
    <!-- Index finger (up - left side) -->
    <rect x="-20" y="-48" width="9" height="52" fill="#F4A76A" rx="4.5"/>
    <circle cx="-15.5" cy="-51" r="5.5" fill="#E89B5E"/>
    
    <!-- Middle finger (bent inward) -->
    <path d="M -2 -40 Q -2 -20 0 -5" fill="none" stroke="#E89B5E" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Ring finger (bent inward) -->
    <path d="M 10 -35 Q 10 -18 10 -4" fill="none" stroke="#E89B5E" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Pinky finger (up - right side) -->
    <rect x="18" y="-46" width="9" height="50" fill="#F4A76A" rx="4.5"/>
    <circle cx="22.5" cy="-49" r="5.5" fill="#E89B5E"/>
    
    <!-- Electric/metal effect lines -->
    <line x1="-15.5" y1="-45" x2="-20" y2="-28" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
    <line x1="22.5" y1="-43" x2="27" y2="-26" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
  </g>
</svg>